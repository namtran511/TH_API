<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hệ thống quản lý sản phẩm - REST API Demo">
  <title>Quản Lý Sản Phẩm | REST API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="bg-blur-circle circle-1"></div>
  <div class="bg-blur-circle circle-2"></div>
  <div class="bg-blur-circle circle-3"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header" id="app-header">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <path d="M16 10a4 4 0 0 1-8 0"/>
            </svg>
          </div>
          <div>
            <h1>Quản Lý Sản Phẩm</h1>
            <p class="subtitle">REST API Management System</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn btn-ghost" id="btn-refresh" onclick="loadProducts()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
            </svg>
            Làm mới
          </button>
          <button class="btn btn-primary" id="btn-add-new" onclick="openAddForm()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Thêm sản phẩm
          </button>
        </div>
      </div>
    </header>

    <!-- Search & Filter Section -->
    <section class="search-section glass-card" id="search-section">
      <div class="search-header">
        <h2>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Tìm kiếm & Lọc
        </h2>
      </div>
      <div class="search-form">
        <div class="input-group">
          <label for="search-name">Tên sản phẩm</label>
          <input type="text" id="search-name" placeholder="Nhập tên sản phẩm..." autocomplete="off">
        </div>
        <div class="input-group">
          <label for="search-material">Tên chất liệu</label>
          <input type="text" id="search-material" placeholder="Nhập tên chất liệu..." autocomplete="off">
        </div>
        <div class="search-buttons">
          <button class="btn btn-accent" id="btn-search" onclick="searchProducts()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            Tìm kiếm
          </button>
          <button class="btn btn-success" id="btn-instock" onclick="loadInStock()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>
            </svg>
            Hàng tồn kho
          </button>
          <button class="btn btn-ghost" id="btn-show-all" onclick="loadProducts()">
            Hiển thị tất cả
          </button>
        </div>
      </div>
    </section>

    <!-- Stats Cards -->
    <section class="stats-section" id="stats-section">
      <div class="stat-card glass-card">
        <div class="stat-icon blue">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="stat-total">0</span>
          <span class="stat-label">Tổng sản phẩm</span>
        </div>
      </div>
      <div class="stat-card glass-card">
        <div class="stat-icon green">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="stat-instock">0</span>
          <span class="stat-label">Còn hàng</span>
        </div>
      </div>
      <div class="stat-card glass-card">
        <div class="stat-icon orange">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-number" id="stat-outstock">0</span>
          <span class="stat-label">Hết hàng</span>
        </div>
      </div>
    </section>

    <!-- Products Table -->
    <section class="table-section glass-card" id="table-section">
      <div class="table-header">
        <h2>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
          </svg>
          Danh sách sản phẩm
        </h2>
        <div style="display: flex; gap: 12px; align-items: center;">
          <span class="badge" id="product-count">0 sản phẩm</span>
          <button class="btn btn-sm btn-ghost" onclick="exportToExcel()" title="Xuất danh sách tồn kho ra Excel">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z"></path>
              <path d="M8 13h2l2 3.5 2-3.5h2l-3 5 3 5h-2l-2-3.5-2 3.5H8l3-5-3-5z"></path>
            </svg>
            Xuất Excel
          </button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="products-table">
          <thead>
            <tr>
              <th>Mã SP</th>
              <th>Tên sản phẩm</th>
              <th>Chất liệu</th>
              <th>Mô tả</th>
              <th>Giá nhập</th>
              <th>Giá bán</th>
              <th>Số lượng</th>
              <th>Thao tác</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr class="empty-row">
              <td colspan="8">
                <div class="empty-state">
                  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
                  </svg>
                  <p>Đang tải dữ liệu...</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <!-- Modal Form -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal glass-card" id="product-modal">
      <div class="modal-header">
        <h2 id="modal-title">Thêm sản phẩm mới</h2>
        <button class="btn-close" id="btn-close-modal" onclick="closeForm()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <form id="product-form" onsubmit="handleSubmit(event)">
        <div class="form-grid">
          <div class="input-group">
            <label for="form-masp">Mã sản phẩm *</label>
            <input type="text" id="form-masp" required maxlength="10" placeholder="VD: SP04">
          </div>
          <div class="input-group">
            <label for="form-tensp">Tên sản phẩm *</label>
            <input type="text" id="form-tensp" required maxlength="100" placeholder="Nhập tên sản phẩm">
          </div>
          <div class="input-group">
            <label for="form-macl">Mã chất liệu *</label>
            <select id="form-macl" required>
              <option value="">-- Chọn chất liệu --</option>
            </select>
          </div>
          <div class="input-group">
            <label for="form-mota">Mô tả</label>
            <input type="text" id="form-mota" maxlength="255" placeholder="Mô tả sản phẩm">
          </div>
          <div class="input-group">
            <label for="form-gianhap">Giá nhập (VNĐ)</label>
            <input type="number" id="form-gianhap" min="0" step="1000" value="0" placeholder="0">
          </div>
          <div class="input-group">
            <label for="form-giaban">Giá bán (VNĐ)</label>
            <input type="number" id="form-giaban" min="0" step="1000" value="0" placeholder="0">
          </div>
          <div class="input-group">
            <label for="form-soluong">Số lượng</label>
            <input type="number" id="form-soluong" min="0" value="0" placeholder="0">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="btn-cancel" onclick="closeForm()">Hủy</button>
          <button type="submit" class="btn btn-primary" id="btn-submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Lưu sản phẩm
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
